<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Shared Files</title>
<style>
  body { font-family: Arial; background:#f5f6fa; padding:30px; }
  h1 { text-align:center; }
  .category { margin-top:20px; margin-left:10px; }
  .file {
    background:white; padding:10px;
    margin:5px 0; border-radius:8px;
  }
  a { text-decoration:none; color:#2f80ed; }
</style>
</head>
<body>

<h1>📁 Shared Files</h1>
<div id="content"></div>

<script>
const username = "CuroNova";
const repo = "shared-files";

async function fetchFiles(path) {
  const url = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;
  const res = await fetch(url);
  return await res.json();
}

// ⭐ 핵심: 재귀 함수
async function renderFolder(path, container, level = 2) {
  const items = await fetchFiles(path);

  for (const item of items) {
    if (item.type === "dir") {
      const folderDiv = document.createElement("div");
      folderDiv.className = "category";
      folderDiv.innerHTML = `<h${Math.min(level,6)}>📂 ${item.name}</h${Math.min(level,6)}>`;
      
      container.appendChild(folderDiv);

      // 하위 폴더 계속 탐색
      await renderFolder(item.path, folderDiv, level + 1);

    } else if (item.type === "file") {
      const fileDiv = document.createElement("div");
      fileDiv.className = "file";
      fileDiv.innerHTML = `<a href="${item.download_url}">📄 ${item.name}</a>`;
      
      container.appendChild(fileDiv);
    }
  }
}

async function load() {
  const container = document.getElementById("content");
  await renderFolder("files", container);
}

load();
</script>

</body>
</html>
