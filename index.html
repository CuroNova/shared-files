<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Shared Files</title>
<style>
  body { font-family: Arial; background:#f5f6fa; padding:30px; }
  h1 { text-align:center; }
  .category { margin-top:30px; }
  .file {
    background:white; padding:10px;
    margin:5px 0; border-radius:8px;
  }
  a { text-decoration:none; color:#2f80ed; }
</style>
</head>
<body>

<h1>📁 Shared Files</h1>
<div id="content"></div>

<script>
const username = "CuroNova";  // ← 반드시 수정
const repo = "shared-files";

async function fetchFiles(path = "files") {
  const url = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;
  const res = await fetch(url);
  return await res.json();
}

async function load() {
  const root = await fetchFiles("files");
  const container = document.getElementById("content");

  for (const item of root) {
    if (item.type === "dir") {
      const categoryDiv = document.createElement("div");
      categoryDiv.className = "category";
      categoryDiv.innerHTML = `<h2>📂 ${item.name}</h2>`;
      
      const files = await fetchFiles(`files/${item.name}`);

      files.forEach(file => {
        if (file.type === "file") {
          const div = document.createElement("div");
          div.className = "file";
          div.innerHTML = `<a href="${file.download_url}">📄 ${file.name}</a>`;
          categoryDiv.appendChild(div);
        }
      });

      container.appendChild(categoryDiv);
    }
  }
}

load();
</script>

</body>
</html>
