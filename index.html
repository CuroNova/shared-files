<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>File Explorer</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>

<body>
  <header>
    <div id="logo" class="logo"></div>

    <button id="homeBtn">처음으로</button>

    <div class="right">
      <a href="https://github.com/CuroNova" target="_blank">by CuroNova</a>
    </div>
  </header>

  <!-- 초기 화면 -->
  <section id="welcomeScreen">
    <img src="images/logo.png" class="bigLogo"/>
    <h1>환영합니다</h1>
    <button id="connectBtn">Connect</button>
  </section>

  <!-- 탐색기 -->
  <section id="explorer" class="hidden">
    <aside id="sidebar"></aside>

    <main id="content">
      <div id="searchBar">
        <input id="searchInput" placeholder="파일 검색..." />
      </div>

      <div id="fileView"></div>
    </main>
  </section>

  <script src="js/tree.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
