<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Shared Files</title>
<style>
  body { font-family: Arial; background:#f5f6fa; padding:30px; }
  h1 { text-align:center; }

  #search {
    display:block;
    margin: 20px auto;
    padding:10px;
    width:300px;
    border-radius:8px;
    border:1px solid #ccc;
  }

  .folder {
    cursor: pointer;
    margin: 5px 0;
    font-weight: bold;
  }

  .folder::before { content: "▶ "; }
  .folder.open::before { content: "▼ "; }

  .children {
    margin-left: 20px;
    display: none;
  }

  .file {
    background:white;
    padding:8px;
    margin:5px 0;
    border-radius:8px;
  }

  a { text-decoration:none; color:#2f80ed; }
</style>
</head>
<body>

<h1>📁 Shared Files</h1>

<input type="text" id="search" placeholder="파일 검색...">

<div id="content"></div>

<script>
const username = "CuroNova";
const repo = "shared-files";

let allFiles = [];

async function fetchFiles(path) {
  const url = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;
  const res = await fetch(url);
  return await res.json();
}

// ⭐ 부모 폴더 열기
function openParents(element) {
  let parent = element.parentElement;

  while (parent) {
    if (parent.classList.contains("children")) {
      parent.style.display = "block";

      const folder = parent.previousElementSibling;
      if (folder && folder.classList.contains("folder")) {
        folder.classList.add("open");
      }
    }
    parent = parent.parentElement;
  }
}

// ⭐ 모든 폴더 닫기 (검색 초기화용)
function closeAllFolders() {
  document.querySelectorAll(".children").forEach(el => {
    el.style.display = "none";
  });
  document.querySelectorAll(".folder").forEach(el => {
    el.classList.remove("open");
  });
}

// ⭐ 정렬 + 트리 + 재귀
async function renderFolder(path, container) {
  const items = await fetchFiles(path);

  const folders = items.filter(item => item.type === "dir");
  const files = items.filter(item => item.type === "file");

  // ⭐ 이름순 정렬
  folders.sort((a, b) => a.name.localeCompare(b.name));
  files.sort((a, b) => a.name.localeCompare(b.name));

  // 폴더 먼저
  for (const item of folders) {
    const folder = document.createElement("div");
    folder.className = "folder";
    folder.textContent = "📂 " + item.name;

    const children = document.createElement("div");
    children.className = "children";

    folder.onclick = () => {
      const isOpen = children.style.display === "block";
      children.style.display = isOpen ? "none" : "block";
      folder.classList.toggle("open");
    };

    container.appendChild(folder);
    container.appendChild(children);

    await renderFolder(item.path, children);
  }

  // 파일 나중
  for (const item of files) {
    const fileDiv = document.createElement("div");
    fileDiv.className = "file";

    const link = document.createElement("a");
    link.href = item.download_url;
    link.textContent = "📄 " + item.name;

    fileDiv.appendChild(link);
    container.appendChild(fileDiv);

    allFiles.push({
      name: item.name.toLowerCase(),
      element: fileDiv
    });
  }
}

// ⭐ 검색 기능
function setupSearch() {
  const input = document.getElementById("search");

  input.addEventListener("input", () => {
    const keyword = input.value.toLowerCase();

    // 검색 초기화
    closeAllFolders();

    allFiles.forEach(file => {
      if (file.name.includes(keyword)) {
        file.element.style.display = "block";
        openParents(file.element); // ⭐ 자동 열림
      } else {
        file.element.style.display = "none";
      }
    });

    // 검색어 없으면 원상복구
    if (keyword === "") {
      allFiles.forEach(file => {
        file.element.style.display = "block";
      });
    }
  });
}

async function load() {
  const container = document.getElementById("content");
  await renderFolder("files", container);
  setupSearch();
}

load();
</script>

</body>
</html>
