name: Generate Tree

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: node generate-tree.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .