name: Update File Tree
on:
  push:
    paths: ['sharedfiles/**']
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate tree.json
        run: |
          mkdir -p json
          echo '{"meta": {"updated": "'$(date -u)'"}, "index": []}' > json/tree.json
          find sharedfiles -type f | while read -r filepath; do
            filename=$(basename "$filepath")
            relpath="$filepath"
            ext="${filename##*.}"
            jq --arg name "$filename" --arg path "$relpath" --arg ext "$ext" \
            '.index += [{"name": $name, "path": $path, "ext": $ext}]' \
            json/tree.json > tmp.json && mv tmp.json json/tree.json
          done
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add json/tree.json
          git commit -m "chore: update tree data [skip ci]" || exit 0
          git push